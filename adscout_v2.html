<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADScout v4</title>

<style>
body{background:#F4F3EF;font-family:'Noto Sans KR',sans-serif;padding:20px;}
.app{max-width:900px;margin:auto;}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:15px;border:1px solid #e5e5e5;}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;}
button{padding:12px 18px;background:#1B4DFF;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;}
button:disabled{background:#999;}
h2{margin-bottom:10px;}
.kw{padding:6px 10px;background:#EEF2FF;border-radius:20px;margin:3px;display:inline-block;font-size:12px;}
.bad{background:#FFECEC;color:#C0001A;}
.good{background:#EDFAF3;color:#0D7A4E;}
</style>
</head>

<body>
<div class="app">

<div class="card">
  <h2>ADScout v4</h2>
  <input id="url" placeholder="https://example.com">
  <br><br>
  <button id="btn" onclick="run()">분석 시작</button>
</div>

<div id="result"></div>

</div>

<script>
async function run(){
  const url = document.getElementById('url').value;
  const btn = document.getElementById('btn');

  if(!url){
    alert("URL 입력");
    return;
  }

  btn.disabled = true;
  document.getElementById('result').innerHTML = "분석중...";

  try{
    const res = await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({url})
    });

    const data = await res.json();

    const text = data.content?.[0]?.text || '';
    const match = text.match(/\{[\s\S]*\}/);

    if(!match) throw new Error("JSON 파싱 실패");

    const r = JSON.parse(match[0]);

    render(r);

  }catch(e){
    console.error(e);
    document.getElementById('result').innerHTML = "에러: " + e.message;
  }

  btn.disabled = false;
}

function render(r){
  const el = document.getElementById('result');

  el.innerHTML = `
  <div class="card">
    <h2>${r.company_name}</h2>
    <div>${r.category}</div>
  </div>

  <div class="card">
    <h3>SEO 키워드</h3>
    ${r.seo_keywords.map(k=>`<span class="kw">${k.keyword}</span>`).join('')}
  </div>

  <div class="card">
    <h3>수익 키워드</h3>
    ${r.profit_keywords.map(k=>`<span class="kw good">${k.keyword}</span>`).join('')}
  </div>

  <div class="card">
    <h3>전체 키워드</h3>
    ${r.all_keywords.map(k=>`<span class="kw">${k.keyword}</span>`).join('')}
  </div>

  <div class="card">
    <h3>제외 키워드</h3>
    ${r.exclude_keywords.map(k=>`<span class="kw bad">${k.keyword}</span>`).join('')}
  </div>
  `;
}
</script>

</body>
</html>
